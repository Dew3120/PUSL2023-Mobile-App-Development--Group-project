name: my_cartier
description: "A luxury retail mobile application for Cartier, featuring a custom jewelry configurator and real-time inventory management integrated with Firebase Cloud."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.0.2
  video_player: ^2.9.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Asset registration
  assets:
    - assets/images/
    - assets/fonts/
    #- assets/videos/

  # Custom font registration using the files you found
  fonts:
    - family: Basis
      fonts:
        - asset: assets/fonts/ffb_basis_regular.otf
        - asset: assets/fonts/ffb_basis_bold.otf
          weight: 700